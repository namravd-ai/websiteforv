<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wait... ❤️</title>

  <style>
    body {
      margin: 0;
      background: #ed3838;
      color: white;
      font-family: 'Poppins', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      overflow: hidden;
    }

    /* Image */
    img {
      width: 500px;
      border-radius: 20px;
      margin-bottom: 30px;
      opacity: 0;
      transform: scale(0.9);
      animation: fadeIn 1.5s ease forwards;
    }

    /* Text */
    p {
  font-size: 32px;              /* bigger text */
  line-height: 1.6;             /* better readability */
  color: #e6e6e6;               /* softer white */
  margin-bottom: 25px;

  font-family: 'Playfair Display', serif;  /* elegant font */

  opacity: 0;
  animation: fadeIn 2s ease forwards;
  animation-delay: 0.5s;
}

    /* Button */
    button {
      padding: 12px 28px;
      border: none;
      background: #ff4d6d;
      color: white;
      border-radius: 30px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
      opacity: 0;
      animation: fadeIn 2.5s ease forwards;
      animation-delay: 1s;
    }

    button:hover {
      transform: scale(1.1);
      background: #ff3355;
    }

    /* Animation */
    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>

</head>

<body>
 <p>Before you go further...</p>
  <img src="assets/sell1.jpg" alt="special moment">

 

<button onclick="nextPage()">Enter</button>

  <script>
    function nextPage() {
      window.location.href = "main.html";
    }
  </script>

</body>
</html>
